name = "relay-server"
type = "javascript"
account_id = "ba1078ad96746f2ac5ebaaa6210c92c8"  # Get from https://dash.cloudflare.com/ - Account Overview
workers_dev = true
main = "src/index.js"
compatibility_date = "2024-04-13"

# Environment configuration
[env.production]
name = "relay-server-production"
routes = [
  { pattern = "api.example.com/*", zone_name = "example.com" }
]

[env.development]
name = "relay-server-development"
workers_dev = true

# Variables (set secrets in Cloudflare dashboard)
[env.production.vars]
NODE_ENV = "production"

[env.development.vars]
NODE_ENV = "development"

# Secrets (use: wrangler secret put DATABASE_URL --env production)
# DATABASE_URL
# JWT_SECRET
# RELAY_AUTH_TOKEN
